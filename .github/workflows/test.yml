# The action's own tests. node --test only — this action is deliberately
# dependency-free, so there is nothing to install and nothing to build.
name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: node --test summarize.test.mjs
